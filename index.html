<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Apply the saved theme to <html> BEFORE the app renders, to avoid a
      // flash of the wrong theme (FOUC). Key + raw values are kept in sync with
      // src/composables/useTheme.ts ('theme' → 'light' | 'dark', stored raw).
      (function () {
        try {
          var saved = localStorage.getItem('theme')
          document.documentElement.dataset.theme =
            saved === 'dark' || saved === 'light' ? saved : 'light'
        } catch (e) {
          /* localStorage unavailable — fall back to CSS default */
        }
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Task Manager</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
